name: Auto Build APK

on:
  push:
    branches:
      - main # Vagy master, ha az a fő ág neve

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Find and Prepare Gradle
        run: |
          # Megkeressük, hol van a gradlew fájl a projektben
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "HIBA: Nem találom a gradlew fájlt sehol a repóban!"
            exit 1
          fi
          echo "Gradlew megtalálva itt: $GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          # Elmentjük a könyvtár elérési útját a következő lépéseknek
          echo "GRADLE_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          cd ${{ env.GRADLE_DIR }}
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: "**/build/outputs/apk/debug/*-debug.apk"
